<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoundrAI — Your AI Co-Founder at $9/mo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #1e1e2e;
      --accent: #7c5cfc;
      --accent2: #00e5b0;
      --accent3: #ff6b6b;
      --text: #f0eff8;
      --muted: #7a7990;
      --syne: 'Syne', sans-serif;
      --dm: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--dm);
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--syne);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-cta {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-family: var(--dm);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,92,252,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%,-50%) scale(1.1); opacity: 0.7; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,92,252,0.12);
      border: 1px solid rgba(124,92,252,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #b89cff;
      margin-bottom: 28px;
      animation: fadeDown 0.7s ease both;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-family: var(--syne);
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      max-width: 800px;
      animation: fadeUp 0.8s 0.1s ease both;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-sub {
      font-size: 18px;
      color: var(--muted);
      max-width: 540px;
      line-height: 1.7;
      margin: 24px 0 44px;
      font-weight: 300;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b3ee0);
      color: #fff;
      border: none;
      padding: 16px 36px;
      border-radius: 10px;
      font-family: var(--dm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 32px rgba(124,92,252,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 48px rgba(124,92,252,0.5); }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 16px 36px;
      border-radius: 10px;
      font-family: var(--dm);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-outline:hover { border-color: var(--accent); background: rgba(124,92,252,0.06); }

    .price-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      font-size: 14px;
      color: var(--muted);
      animation: fadeUp 0.8s 0.4s ease both;
    }
    .price-pill .old { text-decoration: line-through; color: var(--accent3); }
    .price-pill .new { color: var(--accent2); font-weight: 700; font-size: 17px; }

    /* ── COMPARISON BANNER ── */
    .compare-strip {
      background: linear-gradient(90deg, rgba(124,92,252,0.08), rgba(0,229,176,0.08));
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--muted);
    }
    .compare-strip .compare-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .compare-strip .compare-item b { color: var(--text); font-weight: 600; }
    .compare-strip .vs {
      font-family: var(--syne);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── SECTIONS WRAPPER ── */
    .section {
      padding: 100px 24px;
      max-width: 1140px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--syne);
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      max-width: 600px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
      max-width: 520px;
      margin-top: 16px;
      font-weight: 300;
    }

    /* ── PHASES (HOW IT WORKS) ── */
    .phases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 60px;
    }

    .phase-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .phase-card:hover {
      border-color: rgba(124,92,252,0.4);
      transform: translateY(-4px);
    }

    .phase-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .phase-card:hover::before { opacity: 1; }

    .phase-num {
      font-family: var(--syne);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .phase-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .phase-card h3 {
      font-family: var(--syne);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .phase-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── FEATURES ── */
    .features-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-top: 60px;
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .feature-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: border-color 0.3s;
    }
    .feature-item:hover { border-color: rgba(0,229,176,0.3); }

    .feature-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: rgba(124,92,252,0.12);
    }

    .feature-item h4 {
      font-family: var(--syne);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .feature-item p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── MOCK CHAT UI ── */
    .chat-demo {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .chat-name {
      font-family: var(--syne);
      font-weight: 700;
      font-size: 14px;
    }
    .chat-status {
      font-size: 11px;
      color: var(--accent2);
    }

    .chat-msg {
      margin-bottom: 16px;
      animation: msgIn 0.5s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .msg-ai {
      display: flex;
      gap: 10px;
    }

    .msg-ai .bubble {
      background: rgba(124,92,252,0.12);
      border: 1px solid rgba(124,92,252,0.2);
      border-radius: 0 14px 14px 14px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 85%;
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .msg-user .bubble {
      background: rgba(0,229,176,0.1);
      border: 1px solid rgba(0,229,176,0.2);
      border-radius: 14px 0 14px 14px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 75%;
      color: var(--accent2);
    }

    .chat-typing {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }
    .typing-dots {
      display: flex; gap: 4px;
      background: rgba(124,92,252,0.1);
      border: 1px solid rgba(124,92,252,0.2);
      border-radius: 0 14px 14px 14px;
      padding: 14px 18px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot {
      0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── COMPARISON TABLE ── */
    .compare-section { padding: 100px 24px; background: var(--surface); }

    .compare-table {
      max-width: 900px;
      margin: 60px auto 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .compare-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .compare-table th {
      padding: 20px 24px;
      font-family: var(--syne);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .compare-table th:nth-child(2) {
      background: rgba(124,92,252,0.08);
      color: var(--accent);
      text-align: center;
    }

    .compare-table th:nth-child(3) {
      color: var(--muted);
      text-align: center;
    }

    .compare-table td {
      padding: 16px 24px;
      font-size: 14px;
      border-bottom: 1px solid rgba(30,30,46,0.5);
    }

    .compare-table tr:last-child td { border-bottom: none; }

    .compare-table td:nth-child(2) {
      background: rgba(124,92,252,0.04);
      text-align: center;
    }

    .compare-table td:nth-child(3) { text-align: center; color: var(--muted); }

    .check { color: var(--accent2); font-size: 18px; }
    .cross { color: var(--accent3); font-size: 18px; }

    /* ── PRICING ── */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 60px;
    }

    .pricing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      position: relative;
      transition: transform 0.3s;
    }
    .pricing-card:hover { transform: translateY(-6px); }

    .pricing-card.featured {
      border-color: var(--accent);
      background: linear-gradient(145deg, rgba(124,92,252,0.1), var(--card));
    }

    .featured-badge {
      position: absolute;
      top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 100px;
    }

    .plan-name {
      font-family: var(--syne);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .plan-price {
      font-family: var(--syne);
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin: 20px 0;
    }
    .plan-price sup { font-size: 24px; vertical-align: top; margin-top: 10px; }
    .plan-price sub { font-size: 16px; color: var(--muted); font-weight: 400; }

    .plan-desc {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .plan-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
    }

    .plan-features li {
      font-size: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .plan-features li::before {
      content: '✓';
      color: var(--accent2);
      font-weight: 700;
      font-size: 15px;
    }

    .plan-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-family: var(--dm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .plan-btn-main {
      background: linear-gradient(135deg, var(--accent), #5b3ee0);
      color: #fff;
      border: none;
      box-shadow: 0 0 24px rgba(124,92,252,0.3);
    }
    .plan-btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(124,92,252,0.5); }

    .plan-btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .plan-btn-outline:hover { border-color: var(--accent); background: rgba(124,92,252,0.06); }

    /* ── TESTIMONIALS ── */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 60px;
    }

    .testi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: border-color 0.3s;
    }
    .testi-card:hover { border-color: rgba(124,92,252,0.3); }

    .testi-stars { color: #f5c518; font-size: 14px; margin-bottom: 14px; }

    .testi-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .testi-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--syne);
    }

    .testi-info { font-size: 13px; }
    .testi-info b { display: block; font-weight: 600; color: var(--text); }
    .testi-info span { color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 60px 40px 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 40px;
    }

    .footer-brand p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      max-width: 260px;
      margin-top: 12px;
    }

    .footer-links h5 {
      font-family: var(--syne);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .footer-links a:hover { color: var(--text); }

    .footer-bottom {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── SCROLL ANIMATIONS ── */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .features-layout { grid-template-columns: 1fr; }
      .compare-strip { gap: 20px; flex-direction: column; }
      footer { flex-direction: column; }
    }

    /* ── CTA SECTION ── */
    .cta-section {
      padding: 120px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-section::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,176,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
    }

    .cta-section h2 {
      font-family: var(--syne);
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 800;
      letter-spaci
